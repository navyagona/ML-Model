<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness AI | Calorie Predictor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="dashboard">
        <header>
            <div class="logo">Fitness<span>AI</span></div>
            <h1>Predict Your Performance</h1>
        </header>

        <section class="main-content">
            <div class="card glass">
                <form id="fitness-form">
                    <div class="input-grid">
                        <div class="form-group">
                            <label>Duration (Minutes)</label>
                            <input type="number" id="duration" value="30" step="1" required>
                        </div>
                        <div class="form-group">
                            <label>Heart Rate (BPM)</label>
                            <input type="number" id="heart_rate" value="140" step="1" required>
                        </div>
                        <div class="form-group">
                            <label>Weight / Height (BMI)</label>
                            <input type="number" id="bmi" value="24.5" step="0.1" required>
                        </div>
                        <div class="form-group">
                            <label>Age (Years)</label>
                            <input type="number" id="age" value="25" step="1" required>
                        </div>
                    </div>
                    <button type="submit" id="calc-btn">Estimate Calories</button>
                </form>
            </div>

            <div id="result-card" class="card glass result-card hidden">
                <h3>Estimated Calories Burned</h3>
                <div class="calorie-display">
                    <span id="calorie-value">0</span>
                    <span class="unit">kcal</span>
                </div>
                <div class="meter-container">
                    <div id="meter-fill" class="meter-fill"></div>
                </div>
                <p class="insight">Keep up the great work! Consistent activity is key.</p>
            </div>
        </section>

        <div id="loading" class="loading hidden">
            <div class="pulse"></div>
            <p>Analyzing activity metrics...</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
